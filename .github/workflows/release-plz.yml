name: Release PR

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-pr:
    name: Release PR
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: release v') }}"
    runs-on: ubuntu-22.04
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RUNRLY_ECHO_APP_ID }}
          private-key: ${{ secrets.RUNRLY_ECHO_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0.5.130
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          command: release-pr
          config: release-plz.toml
          version: 0.3.159

  release:
    name: Tag release
    if: "${{ startsWith(github.event.head_commit.message, 'chore: release v') }}"
    runs-on: ubuntu-22.04
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RUNRLY_ECHO_APP_ID }}
          private-key: ${{ secrets.RUNRLY_ECHO_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Create release tag
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "zwd") | .version')"
          tag="v${version}"
          git config user.name "runrly-echo[bot]"
          git config user.email "runrly-echo[bot]@users.noreply.github.com"
          git tag "${tag}"
          git push origin "${tag}"
